<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Ranker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f6f3; color: #1a1a1a; min-height: 100vh; }
    #root { max-width: 600px; margin: 0 auto; padding: 0 1rem 6rem; }

    /* Header */
    .page-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0 1rem; }
    h1 { font-size: 1.6rem; font-weight: 800; }
    h2 { font-size: 1.2rem; font-weight: 700; }
    h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #bbb; margin-bottom: 0.75rem; }

    /* Buttons */
    button { cursor: pointer; font-family: inherit; border: none; }
    .btn { border-radius: 12px; font-size: 1rem; font-weight: 600; padding: 0.75rem 1.5rem; }
    .btn-primary { background: #ff6b35; color: white; }
    .btn-primary:hover { background: #e55c28; }
    .btn-secondary { background: #edeae4; color: #444; }
    .btn-secondary:hover { background: #e0ddd6; }
    .btn-ghost { background: none; color: #ff6b35; font-size: 1rem; font-weight: 600; padding: 0.5rem 0; }
    .btn-fab { width: 44px; height: 44px; border-radius: 50%; background: #ff6b35; color: white; font-size: 1.6rem; line-height: 1; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(255,107,53,0.4); padding-bottom: 2px; }
    .btn-fab:hover { background: #e55c28; }

    /* Category cards */
    .cat-card { background: white; border-radius: 16px; padding: 1.1rem 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; }
    .cat-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.12); transform: translateY(-1px); }
    .cat-card-name { font-weight: 700; font-size: 1.05rem; flex: 1; }
    .cat-card-chevron { color: #ccc; font-size: 1.4rem; }

    /* Entry cards */
    .entry-card { background: white; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; }
    .entry-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.12); transform: translateY(-1px); }
    .entry-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
    .entry-card-title { font-weight: 700; font-size: 1.05rem; }
    .entry-card-date { color: #aaa; font-size: 0.8rem; margin-top: 0.15rem; }
    .entry-card-ordered { color: #666; font-size: 0.9rem; margin-top: 0.4rem; }

    /* Rating */
    .rating-pill { background: #ff6b35; color: white; border-radius: 10px; padding: 0.25rem 0.65rem; font-weight: 800; font-size: 0.9rem; white-space: nowrap; flex-shrink: 0; }
    .rating-hero { font-size: 2.5rem; font-weight: 900; color: #ff6b35; }

    /* Empty state */
    .empty { text-align: center; padding: 4rem 2rem; }
    .empty-emoji { font-size: 4rem; margin-bottom: 0.75rem; }
    .empty h2 { margin-bottom: 0.5rem; }
    .empty p { color: #888; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }

    /* Back nav */
    .back-nav { padding: 0.75rem 0 0; }

    /* Entry detail */
    .detail-hero { display: flex; justify-content: space-between; align-items: flex-start; padding: 1rem 0; }
    .detail-restaurant { font-size: 1.4rem; font-weight: 800; }
    .detail-date { color: #aaa; font-size: 0.85rem; margin-top: 0.25rem; }
    .detail-fields { background: white; border-radius: 16px; padding: 1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 0.75rem; }
    .detail-field { padding: 0.6rem 0; border-bottom: 1px solid #f0ede8; }
    .detail-field:last-child { border-bottom: none; }
    .detail-field-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #bbb; margin-bottom: 0.15rem; }
    .detail-field-value { font-size: 0.95rem; }
    .scorers-section { background: white; border-radius: 16px; padding: 1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .scorer-pill { display: inline-flex; align-items: center; gap: 0.4rem; background: #fff3ee; border: 1.5px solid #ffd0b8; border-radius: 20px; padding: 0.3rem 0.85rem; font-size: 0.9rem; margin: 0.25rem; }
    .scorer-pill-rating { font-weight: 800; color: #ff6b35; }

    /* Modal overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .sheet { background: white; border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .sheet-close { background: #f0ede8; width: 32px; height: 32px; border-radius: 50%; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; color: #666; }
    .sheet-close:hover { background: #e5e0d8; }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-row { display: flex; gap: 0.75rem; }
    .form-row .form-group { flex: 1; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 0.3rem; }
    input[type=text], input[type=date], input[type=number], textarea {
      width: 100%; border: 1.5px solid #e0dcd6; border-radius: 10px; padding: 0.65rem 0.8rem;
      font-size: 1rem; font-family: inherit; background: #faf8f5; transition: border-color 0.15s;
    }
    input:focus, textarea:focus { outline: none; border-color: #ff6b35; background: white; }
    textarea { resize: vertical; min-height: 75px; }

    /* Scorer rows in form */
    .scorer-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .scorer-row .person { flex: 1; }
    .scorer-row .score { width: 80px; flex-shrink: 0; }
    .scorer-row .remove { background: none; color: #ff4444; font-size: 1.2rem; padding: 0 0.2rem; line-height: 1; }
    .add-scorer { background: none; border: 1.5px dashed #ccc; border-radius: 10px; color: #999; font-size: 0.9rem; padding: 0.5rem; width: 100%; font-family: inherit; cursor: pointer; margin-top: 0.25rem; }
    .add-scorer:hover { border-color: #ff6b35; color: #ff6b35; }

    /* Form actions */
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .form-actions button { flex: 1; padding: 0.75rem; }

    /* Import button */
    .btn-import { background: none; border: 1.5px solid #ddd; border-radius: 10px; color: #888; font-size: 0.85rem; font-weight: 600; padding: 0.45rem 0.85rem; }
    .btn-import:hover { border-color: #ff6b35; color: #ff6b35; }
    .header-actions { display: flex; align-items: center; gap: 0.65rem; }

    /* Entry detail actions */
    .detail-actions { display: flex; gap: 0.75rem; margin-top: 1rem; margin-bottom: 0.75rem; }
    .btn-edit { background: #f0ede8; color: #444; border-radius: 12px; font-size: 0.95rem; font-weight: 600; padding: 0.65rem 1.25rem; flex: 1; }
    .btn-edit:hover { background: #e5e0d8; }
    .btn-delete { background: #fff0f0; color: #cc2222; border: 1.5px solid #ffcccc; border-radius: 12px; font-size: 0.95rem; font-weight: 600; padding: 0.65rem 1.25rem; flex: 1; }
    .btn-delete:hover { background: #ffe0e0; }

    /* Loading */
    .loading { text-align: center; padding: 3rem; color: #aaa; font-size: 0.95rem; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>
<script>
// ── Helpers ─────────────────────────────────────────────────────────────────
function el(tag, props, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (k === 'class') e.className = v;
    else if (k === 'id') e.id = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k === 'value') e.value = v;
    else if (k.startsWith('on')) e[k] = v;
    else e.setAttribute(k, v);
  }
  const add = (c) => {
    if (c == null || c === false) return;
    if (Array.isArray(c)) c.forEach(add);
    else if (c instanceof Node) e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  };
  children.forEach(add);
  return e;
}

function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function avgRating(scorers) {
  if (!scorers || !scorers.length) return null;
  return Math.round(scorers.reduce((sum, sc) => sum + sc.rating, 0) / scorers.length);
}

// ── API ──────────────────────────────────────────────────────────────────────
const api = {
  async _fetch(path, opts) {
    const r = await fetch(path, opts);
    if (!r.ok) { const e = await r.json(); throw new Error(e.error || r.statusText); }
    return r.json();
  },
  categories: () => api._fetch('/categories'),
  createCategory: (name) => api._fetch('/categories', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }),
  }),
  entries: (categoryId) => api._fetch('/entries?categoryId=' + encodeURIComponent(categoryId)),
  createEntry: (data) => api._fetch('/entries', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
  }),
  updateEntry: (entryId, data) => api._fetch('/entries/' + encodeURIComponent(entryId), {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
  }),
  deleteEntry: (entryId) => api._fetch('/entries/' + encodeURIComponent(entryId), { method: 'DELETE' }),
};

// ── State ────────────────────────────────────────────────────────────────────
let S = { view: 'home', category: null, entry: null, modal: null };

function go(view, extra = {}) {
  S = { ...S, view, modal: null, ...extra };
  render();
}

function openModal(m) { S = { ...S, modal: m }; render(); }
function closeModal() { S = { ...S, modal: null }; render(); }

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  const modalRoot = document.getElementById('modal-root');
  root.innerHTML = '';
  modalRoot.innerHTML = '';

  if (S.view === 'home') renderHome(root);
  else if (S.view === 'category') renderCategory(root, S.category);
  else if (S.view === 'entry') renderEntryDetail(root, S.entry);

  if (S.modal === 'add-category') renderAddCategoryModal(modalRoot);
  else if (S.modal === 'add-entry') renderAddEntryModal(modalRoot);
  else if (S.modal === 'edit-entry') renderEditEntryModal(modalRoot);
}

// ── Home ─────────────────────────────────────────────────────────────────────
function renderHome(root) {
  root.appendChild(el('div', { class: 'loading' }, 'Loading…'));

  api.categories().then(data => {
    const cats = data.categorys || [];
    root.innerHTML = '';

    root.appendChild(el('div', { class: 'page-header' },
      el('h1', {}, '🍽️ Food Ranker'),
      cats.length > 0
        ? el('button', { class: 'btn-fab', onclick: () => openModal('add-category') }, '+')
        : null,
    ));

    if (cats.length === 0) {
      root.appendChild(el('div', { class: 'empty' },
        el('div', { class: 'empty-emoji' }, '🍕'),
        el('h2', {}, 'Track your favorite foods'),
        el('p', {}, 'Start by adding a food type like "Wings" or "Burgers"'),
        el('button', { class: 'btn btn-primary', onclick: () => openModal('add-category') }, 'Add your first food type'),
      ));
    } else {
      cats.forEach(cat => {
        root.appendChild(el('div', { class: 'cat-card', onclick: () => go('category', { category: cat }) },
          el('div', { class: 'cat-card-name' }, cat.name),
          el('div', { class: 'cat-card-chevron' }, '›'),
        ));
      });
    }
  }).catch(e => {
    root.innerHTML = '';
    root.appendChild(el('div', { class: 'empty' }, el('p', {}, 'Failed to load: ' + e.message)));
  });
}

// ── Category ─────────────────────────────────────────────────────────────────
function renderCategory(root, cat) {
  root.appendChild(el('div', { class: 'back-nav' },
    el('button', { class: 'btn-ghost', onclick: () => go('home') }, '← Back'),
  ));
  root.appendChild(el('div', { class: 'loading' }, 'Loading…'));

  api.entries(cat.categoryId).then(data => {
    while (root.children.length > 1) root.removeChild(root.lastChild);

    root.appendChild(el('div', { class: 'page-header' },
      el('h1', {}, cat.name),
      el('div', { class: 'header-actions' },
        el('button', { class: 'btn-import', onclick: () => triggerImport(cat) }, '📥 CSV'),
        el('button', { class: 'btn-fab', onclick: () => openModal('add-entry') }, '+'),
      ),
    ));

    const entries = data.entrys || [];
    if (entries.length === 0) {
      root.appendChild(el('div', { class: 'empty' },
        el('div', { class: 'empty-emoji' }, '🍴'),
        el('h2', {}, 'No entries yet'),
        el('p', {}, 'Add your first ' + cat.name + ' review'),
        el('button', { class: 'btn btn-primary', onclick: () => openModal('add-entry') }, 'Add first entry'),
      ));
    } else {
      entries.forEach(entry => {
        const avg = avgRating(entry.scorers);
        root.appendChild(el('div', { class: 'entry-card', onclick: () => go('entry', { entry }) },
          el('div', { class: 'entry-card-top' },
            el('div', {},
              el('div', { class: 'entry-card-title' }, entry.restaurant),
              el('div', { class: 'entry-card-date' }, fmtDate(entry.date)),
              el('div', { class: 'entry-card-ordered' }, entry.ordered),
            ),
            avg !== null ? el('div', { class: 'rating-pill' }, avg + '/100') : null,
          ),
        ));
      });
    }
  }).catch(e => {
    while (root.children.length > 1) root.removeChild(root.lastChild);
    root.appendChild(el('div', { class: 'empty' }, el('p', {}, 'Failed to load: ' + e.message)));
  });
}

// ── Entry Detail ─────────────────────────────────────────────────────────────
function renderEntryDetail(root, entry) {
  const avg = entry.scorers && entry.scorers.length
    ? (entry.scorers.reduce((s, sc) => s + sc.rating, 0) / entry.scorers.length).toFixed(1)
    : null;

  root.appendChild(el('div', { class: 'back-nav' },
    el('button', { class: 'btn-ghost', onclick: () => go('category') }, '← Back'),
  ));

  root.appendChild(el('div', { class: 'detail-hero' },
    el('div', {},
      el('div', { class: 'detail-restaurant' }, entry.restaurant),
      el('div', { class: 'detail-date' }, fmtDate(entry.date)),
    ),
    avg !== null ? el('div', { class: 'rating-hero' }, avg) : null,
  ));

  root.appendChild(el('div', { class: 'detail-actions' },
    el('button', { class: 'btn-edit', onclick: () => openModal('edit-entry') }, '✏️ Edit'),
    el('button', {
      class: 'btn-delete',
      onclick: async () => {
        if (!confirm('Delete this entry?')) return;
        try {
          await api.deleteEntry(entry.entryId);
          go('category');
        } catch (err) {
          alert(err.message);
        }
      },
    }, '🗑 Delete'),
  ));

  const fieldDefs = [
    ['Ordered', entry.ordered],
    ['Impressions', entry.impressions],
    ['Price', entry.price],
    entry.notes ? ['Notes', entry.notes] : null,
  ].filter(Boolean);

  root.appendChild(el('div', { class: 'detail-fields' },
    ...fieldDefs.map(([label, value]) =>
      el('div', { class: 'detail-field' },
        el('div', { class: 'detail-field-label' }, label),
        el('div', { class: 'detail-field-value' }, value),
      )
    ),
  ));

  if (entry.scorers && entry.scorers.length > 0) {
    root.appendChild(el('div', { class: 'scorers-section' },
      el('h3', {}, 'Ratings'),
      ...entry.scorers.map(sc =>
        el('span', { class: 'scorer-pill' },
          sc.person + ' ',
          el('span', { class: 'scorer-pill-rating' }, sc.rating + '/100'),
        )
      ),
    ));
  }
}

// ── Add Category Modal ────────────────────────────────────────────────────────
function renderAddCategoryModal(root) {
  const nameInput = el('input', { type: 'text', id: 'cat-name', placeholder: 'e.g. Wings, Burgers, Pizza' });

  const form = el('form', {
    onsubmit: async (evt) => {
      evt.preventDefault();
      const name = nameInput.value.trim();
      if (!name) return;
      try {
        await api.createCategory(name);
        closeModal();
        go('home');
      } catch (err) {
        alert(err.message);
      }
    },
  },
    el('div', { class: 'form-group' },
      el('label', {}, 'Food Type Name'),
      nameInput,
    ),
    el('div', { class: 'form-actions' },
      el('button', { type: 'button', class: 'btn btn-secondary', onclick: closeModal }, 'Cancel'),
      el('button', { type: 'submit', class: 'btn btn-primary' }, 'Add'),
    ),
  );

  const overlay = el('div', { class: 'overlay', onclick: (evt) => { if (evt.target === overlay) closeModal(); } },
    el('div', { class: 'sheet' },
      el('div', { class: 'sheet-header' },
        el('h2', {}, 'New Food Type'),
        el('button', { type: 'button', class: 'sheet-close', onclick: closeModal }, '×'),
      ),
      form,
    ),
  );

  root.appendChild(overlay);
  setTimeout(() => nameInput.focus(), 50);
}

// ── Add Entry Modal ───────────────────────────────────────────────────────────
function renderAddEntryModal(root) {
  let scorerIdx = 1;
  const scorersList = el('div', { id: 'scorers-list' }, makeScorerRow(0));

  const form = el('form', {
    onsubmit: async (evt) => {
      evt.preventDefault();
      const scorers = [];
      scorersList.querySelectorAll('.scorer-entry').forEach(row => {
        const person = row.querySelector('.person').value.trim();
        const rating = parseInt(row.querySelector('.score').value, 10);
        if (person && !isNaN(rating)) scorers.push({ person, rating });
      });

      const g = (id) => document.getElementById(id)?.value.trim() ?? '';
      const data = {
        categoryId: S.category.categoryId,
        date: g('e-date'),
        restaurant: g('e-restaurant'),
        ordered: g('e-ordered'),
        impressions: g('e-impressions'),
        price: g('e-price'),
        notes: g('e-notes'),
        scorers,
      };

      try {
        await api.createEntry(data);
        closeModal();
        go('category');
      } catch (err) {
        alert(err.message);
      }
    },
  },
    el('div', { class: 'form-group' },
      el('label', {}, 'Restaurant'),
      el('input', { type: 'text', id: 'e-restaurant', placeholder: 'e.g. Wing Stop' }),
    ),
    el('div', { class: 'form-row' },
      el('div', { class: 'form-group' },
        el('label', {}, 'Date'),
        el('input', { type: 'date', id: 'e-date', value: new Date().toISOString().split('T')[0] }),
      ),
      el('div', { class: 'form-group' },
        el('label', {}, 'Price'),
        el('input', { type: 'text', id: 'e-price', placeholder: 'e.g. $14' }),
      ),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'What you ordered'),
      el('input', { type: 'text', id: 'e-ordered', placeholder: 'e.g. Lemon Pepper Wings' }),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'Impressions'),
      el('input', { type: 'text', id: 'e-impressions', placeholder: 'e.g. Crispy and flavorful' }),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'Notes (optional)'),
      el('textarea', { id: 'e-notes', placeholder: 'Any extra thoughts…' }),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'Scorers'),
      scorersList,
      el('button', {
        type: 'button', class: 'add-scorer',
        onclick: () => scorersList.appendChild(makeScorerRow(scorerIdx++)),
      }, '+ Add another scorer'),
    ),
    el('div', { class: 'form-actions' },
      el('button', { type: 'button', class: 'btn btn-secondary', onclick: closeModal }, 'Cancel'),
      el('button', { type: 'submit', class: 'btn btn-primary' }, 'Save Entry'),
    ),
  );

  const overlay = el('div', { class: 'overlay', onclick: (evt) => { if (evt.target === overlay) closeModal(); } },
    el('div', { class: 'sheet' },
      el('div', { class: 'sheet-header' },
        el('h2', {}, 'New Entry — ' + S.category.name),
        el('button', { type: 'button', class: 'sheet-close', onclick: closeModal }, '×'),
      ),
      form,
    ),
  );

  root.appendChild(overlay);
  setTimeout(() => document.getElementById('e-restaurant')?.focus(), 50);
}

// ── Edit Entry Modal ──────────────────────────────────────────────────────────
function renderEditEntryModal(root) {
  const entry = S.entry;
  let scorerIdx = entry.scorers ? entry.scorers.length : 1;

  const existingScorers = (entry.scorers && entry.scorers.length > 0)
    ? entry.scorers.map((sc, i) => {
        const row = el('div', { class: 'scorer-entry scorer-row' },
          Object.assign(el('input', { type: 'text', class: 'person', placeholder: 'Person name' }), { value: sc.person }),
          Object.assign(el('input', { type: 'number', class: 'score', placeholder: '0–100', min: '0', max: '100' }), { value: sc.rating }),
        );
        if (i > 0) {
          row.appendChild(el('button', { type: 'button', class: 'remove', onclick: () => row.remove() }, '×'));
        }
        return row;
      })
    : [makeScorerRow(0)];

  const scorersList = el('div', { id: 'scorers-list' }, ...existingScorers);

  const form = el('form', {
    onsubmit: async (evt) => {
      evt.preventDefault();
      const scorers = [];
      scorersList.querySelectorAll('.scorer-entry').forEach(row => {
        const person = row.querySelector('.person').value.trim();
        const rating = parseInt(row.querySelector('.score').value, 10);
        if (person && !isNaN(rating)) scorers.push({ person, rating });
      });

      const g = (id) => document.getElementById(id)?.value.trim() ?? '';
      const data = {
        categoryId: S.category.categoryId,
        date: g('ee-date'),
        restaurant: g('ee-restaurant'),
        ordered: g('ee-ordered'),
        impressions: g('ee-impressions'),
        price: g('ee-price'),
        notes: g('ee-notes'),
        scorers,
      };

      try {
        const updated = await api.updateEntry(entry.entryId, data);
        S.entry = updated;
        closeModal();
        go('entry');
      } catch (err) {
        alert(err.message);
      }
    },
  },
    el('div', { class: 'form-group' },
      el('label', {}, 'Restaurant'),
      Object.assign(el('input', { type: 'text', id: 'ee-restaurant', placeholder: 'e.g. Wing Stop' }), { value: entry.restaurant || '' }),
    ),
    el('div', { class: 'form-row' },
      el('div', { class: 'form-group' },
        el('label', {}, 'Date'),
        Object.assign(el('input', { type: 'date', id: 'ee-date' }), { value: entry.date || '' }),
      ),
      el('div', { class: 'form-group' },
        el('label', {}, 'Price'),
        Object.assign(el('input', { type: 'text', id: 'ee-price', placeholder: 'e.g. $14' }), { value: entry.price || '' }),
      ),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'What you ordered'),
      Object.assign(el('input', { type: 'text', id: 'ee-ordered', placeholder: 'e.g. Lemon Pepper Wings' }), { value: entry.ordered || '' }),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'Impressions'),
      Object.assign(el('input', { type: 'text', id: 'ee-impressions', placeholder: 'e.g. Crispy and flavorful' }), { value: entry.impressions || '' }),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'Notes (optional)'),
      Object.assign(el('textarea', { id: 'ee-notes', placeholder: 'Any extra thoughts…' }), { value: entry.notes || '' }),
    ),
    el('div', { class: 'form-group' },
      el('label', {}, 'Scorers'),
      scorersList,
      el('button', {
        type: 'button', class: 'add-scorer',
        onclick: () => scorersList.appendChild(makeScorerRow(scorerIdx++)),
      }, '+ Add another scorer'),
    ),
    el('div', { class: 'form-actions' },
      el('button', { type: 'button', class: 'btn btn-secondary', onclick: closeModal }, 'Cancel'),
      el('button', { type: 'submit', class: 'btn btn-primary' }, 'Save Changes'),
    ),
  );

  const overlay = el('div', { class: 'overlay', onclick: (evt) => { if (evt.target === overlay) closeModal(); } },
    el('div', { class: 'sheet' },
      el('div', { class: 'sheet-header' },
        el('h2', {}, 'Edit Entry'),
        el('button', { type: 'button', class: 'sheet-close', onclick: closeModal }, '×'),
      ),
      form,
    ),
  );

  root.appendChild(overlay);
  setTimeout(() => document.getElementById('ee-restaurant')?.focus(), 50);
}

function makeScorerRow(idx) {
  const row = el('div', { class: 'scorer-entry scorer-row' },
    el('input', { type: 'text', class: 'person', placeholder: 'Person name' }),
    el('input', { type: 'number', class: 'score', placeholder: '0–100', min: '0', max: '100' }),
  );
  if (idx > 0) {
    row.appendChild(el('button', { type: 'button', class: 'remove', onclick: () => row.remove() }, '×'));
  }
  return row;
}

// ── CSV Import ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const fields = [];
    let field = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuotes && line[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (c === ',' && !inQuotes) {
        fields.push(field); field = '';
      } else {
        field += c;
      }
    }
    fields.push(field);
    rows.push(fields);
  }
  return rows;
}

function triggerImport(cat) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,text/csv';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const rows = parseCSV(await file.text());
    if (rows.length < 2) { alert('CSV is empty or has no data rows.'); return; }

    const headers = rows[0].map(h => h.toLowerCase().trim());
    const dataRows = rows.slice(1).filter(r => r.some(c => c.trim()));
    if (!confirm(`Import ${dataRows.length} entr${dataRows.length === 1 ? 'y' : 'ies'} into "${cat.name}"?`)) return;

    let success = 0, failed = 0;
    for (const row of dataRows) {
      const get = (name) => (row[headers.indexOf(name)] ?? '').trim();
      // scorers column: "Name:Rating|Name2:Rating2"
      const scorersRaw = get('scorers');
      const scorers = scorersRaw
        ? scorersRaw.split('|').flatMap(s => {
            const colon = s.lastIndexOf(':');
            if (colon < 1) return [];
            const person = s.slice(0, colon).trim();
            const rating = parseInt(s.slice(colon + 1), 10);
            return person && !isNaN(rating) ? [{ person, rating }] : [];
          })
        : [];
      try {
        await api.createEntry({
          categoryId: cat.categoryId,
          date: get('date'),
          restaurant: get('restaurant'),
          ordered: get('ordered'),
          impressions: get('impressions'),
          price: get('price'),
          notes: get('notes'),
          scorers,
        });
        success++;
      } catch (_) { failed++; }
    }
    alert(`✅ Imported ${success} entries${failed > 0 ? ` (${failed} failed)` : ''}.`);
    go('category');
  };
  input.click();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
